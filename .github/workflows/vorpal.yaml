  release-website-docs:
    environment:
      name: prod
      url: https://docs.vorpal.build
    if: ${{ github.event_name == 'push' && contains(github.ref, 'refs/tags/') && !contains(github.ref, 'nightly') }}
    needs:
      - test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - run: ./script/dev/debian.sh

      - run: |
          echo "ARCH=$(uname -m | tr '[:upper:]' '[:lower:]' | sed 's/arm64/aarch64/')" >> $GITHUB_ENV
          echo "OS=$(uname -s | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: actions/download-artifact@v8
        with:
          name: vorpal-dist-${{ env.ARCH }}-${{ env.OS }}

      - run: |
          mkdir -p ./dist
          tar -xzf ./vorpal-${ARCH}-${OS}.tar.gz -C ./dist
          rm -rf ./vorpal-${ARCH}-${OS}.tar.gz

      - uses: ALT-F4-LLC/setup-vorpal-action@main
        with:
          registry-backend: s3
          registry-backend-s3-bucket: altf4llc-vorpal-registry
          use-local-build: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - run: |
          VORPAL_WEBSITE_PATH=$(vorpal build --path "vorpal-website")
          echo "VORPAL_WEBSITE_PATH=$VORPAL_WEBSITE_PATH" >> $GITHUB_ENV
          if [ ! -f "$VORPAL_WEBSITE_PATH/index.html" ]; then
            echo "ERROR: website build output missing index.html"
            ls -la "$VORPAL_WEBSITE_PATH/" || true
            exit 1
          fi

      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --root-dir ${{ env.VORPAL_WEBSITE_PATH }}
            --exclude-path ${{ env.VORPAL_WEBSITE_PATH }}/pagefind
            --max-retries 3
            --no-progress
            --retry-wait-time 5
            --timeout 30
            ${{ env.VORPAL_WEBSITE_PATH }}

      - uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy ${{ env.VORPAL_WEBSITE_PATH }} --project-name=vorpal-website-docs
