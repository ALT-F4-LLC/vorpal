  #         VERSION=$(grep '^version' sdk/rust/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
  #         echo "Checking crates.io for vorpal-sdk@${VERSION}"
  #         RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/vorpal-sdk/${VERSION}")
  #         if [ "$RESPONSE" = "200" ]; then
  #           echo "VERSION_EXISTS=true" >> "$GITHUB_ENV"
  #           echo "Version ${VERSION} already exists on crates.io, skipping publish"
  #         else
  #           echo "VERSION_EXISTS=false" >> "$GITHUB_ENV"
