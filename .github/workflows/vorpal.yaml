name: vorpal

on:
  pull_request:
  push:
    branches:
      - "main"
    tags:
      - "*"

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

env:
  CI: "true"

jobs:
  vendor:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner:
          - macos-latest
          - macos-latest-large
          - ubuntu-latest
          - ubuntu-latest-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.arch }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-target
          path: target

      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.arch }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-vendor
          path: vendor

      - run: ./script/dev.sh # pre-bake
      - run: ./script/dev.sh make .cargo vendor
      - run: ./script/dev.sh make TARGET=release check

      - uses: actions/cache/save@v5
        with:
          key: ${{ runner.arch }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-target
          path: target

      - uses: actions/cache/save@v5
        with:
          key: ${{ runner.arch }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-vendor
          path: vendor

  code-quality:
    needs:
      - vendor
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.arch }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-target
          path: target

      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.arch }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-vendor
          path: vendor

      - run: ./script/dev.sh # pre-bake
      - run: ./script/dev.sh make .cargo vendor
      - run: ./script/dev.sh make format
      - run: ./script/dev.sh make TARGET=release lint

  build:
    needs:
      - code-quality
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner:
          - macos-latest
          - macos-latest-large
          - ubuntu-latest
          - ubuntu-latest-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.arch }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-target
          path: target

      - uses: actions/cache/restore@v5
        with:
          key: ${{ runner.arch }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-vendor
          path: vendor

      - run: ./script/dev.sh # pre-bake
      - run: ./script/dev.sh make .cargo vendor
      - run: ./script/dev.sh make TARGET=release build

      - name: Verify no non-system dynamic deps (macOS)
        if: ${{ !contains(matrix.runner, 'ubuntu') }}
        run: |
          if otool -L target/release/vorpal | grep -qE '/opt/homebrew|/usr/local/lib|liblzma|libzstd|liblz4|libbrotli'; then
            echo "ERROR: Found non-system dynamic library dependencies:"
            otool -L target/release/vorpal | grep -E '/opt/homebrew|/usr/local/lib|liblzma|libzstd|liblz4|libbrotli'
            exit 1
          fi

      - name: Verify no non-system dynamic deps (Linux)
        if: ${{ contains(matrix.runner, 'ubuntu') }}
        run: |
          if ldd target/release/vorpal | grep -qE 'liblzma|libzstd|liblz4|libbrotli|/usr/local/lib|/opt/'; then
            echo "ERROR: Found non-system dynamic library dependencies:"
            ldd target/release/vorpal | grep -E 'liblzma|libzstd|liblz4|libbrotli|/usr/local/lib|/opt/'
            exit 1
          fi

      - run: ./script/dev.sh make TARGET=release test
      - run: ./script/dev.sh make TARGET=release dist

      - run: |
          echo "ARCH=$(uname -m | tr '[:upper:]' '[:lower:]' | sed 's/arm64/aarch64/')" >> $GITHUB_ENV
          echo "OS=$(uname -s | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v7
        with:
          name: vorpal-dist-${{ env.ARCH }}-${{ env.OS }}
          path: dist

  test:
    needs:
      - build
    permissions:
      contents: read
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-latest
          - macos-latest-large
          - ubuntu-latest
          - ubuntu-latest-arm64
    steps:
      - uses: actions/checkout@v6

      - if: contains(matrix.runner, 'ubuntu')
        run: ./script/dev/debian.sh

      - run: |
          echo "ARCH=$(uname -m | tr '[:upper:]' '[:lower:]' | sed 's/arm64/aarch64/')" >> $GITHUB_ENV
          echo "OS=$(uname -s | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: actions/download-artifact@v8
        with:
          name: vorpal-dist-${{ env.ARCH }}-${{ env.OS }}

      - run: |
          mkdir -p ./dist
          tar -xzf ./vorpal-${ARCH}-${OS}.tar.gz -C ./dist
          rm -rf ./vorpal-${ARCH}-${OS}.tar.gz

      - uses: ALT-F4-LLC/setup-vorpal-action@main
        with:
          registry-backend: s3
          registry-backend-s3-bucket: altf4llc-vorpal-registry
          use-local-build: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Prepare lockfile
        id: prepare_lock
        run: |
          artifacts=(
            "vorpal"
            "vorpal-job"
            "vorpal-process"
            "vorpal-shell"
            "vorpal-user"
            "vorpal-website"
          )
          if [ "${{ contains(matrix.runner, 'ubuntu') }}" = "true" ]; then
            artifacts=(
              "vorpal"
              "vorpal-container-image"
              "vorpal-job"
              "vorpal-process"
              "vorpal-shell"
              "vorpal-user"
              "vorpal-website"
            )
          fi

          configs=("" "Vorpal.go.toml" "Vorpal.ts.toml" "Vorpal.py.toml")
          for config in "${configs[@]}"; do
            for artifact in "${artifacts[@]}"; do
              if [ -n "$config" ]; then
                vorpal prepare --config "$config" "$artifact"
              else
                vorpal prepare "$artifact"
              fi
            done
          done

          if git diff --quiet -- Vorpal.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload prepared lockfile
        if: ${{ steps.prepare_lock.outputs.changed == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: vorpal-prepare-lock-${{ env.ARCH }}-${{ env.OS }}
          path: Vorpal.lock

      - name: Fail on lockfile drift
        if: ${{ steps.prepare_lock.outputs.changed == 'true' }}
        run: |
          echo "::error file=Vorpal.lock::vorpal prepare changed Vorpal.lock. Download the vorpal-prepare-lock-${ARCH}-${OS} artifact, replace Vorpal.lock, commit it, and re-push."
          exit 1

      - run: |
          VORPAL_ARTIFACT=$(vorpal build "vorpal")
          echo "VORPAL_ARTIFACT=$VORPAL_ARTIFACT" >> $GITHUB_ENV

      - if: contains(matrix.runner, 'ubuntu')
        run: |
          VORPAL_CONTAINER_IMAGE_ARTIFACT=$(vorpal build "vorpal-container-image")
          echo "VORPAL_CONTAINER_IMAGE_ARTIFACT=$VORPAL_CONTAINER_IMAGE_ARTIFACT" >> $GITHUB_ENV

      - run: |
          VORPAL_JOB_ARTIFACT=$(vorpal build "vorpal-job")
          echo "VORPAL_JOB_ARTIFACT=$VORPAL_JOB_ARTIFACT" >> $GITHUB_ENV

      - run: |
          VORPAL_PROCESS_ARTIFACT=$(vorpal build "vorpal-process")
          echo "VORPAL_PROCESS_ARTIFACT=$VORPAL_PROCESS_ARTIFACT" >> $GITHUB_ENV

      - run: |
          VORPAL_SHELL_ARTIFACT=$(vorpal build "vorpal-shell")
          echo "VORPAL_SHELL_ARTIFACT=$VORPAL_SHELL_ARTIFACT" >> $GITHUB_ENV

      - run: |
          VORPAL_USER_ARTIFACT=$(vorpal build "vorpal-user")
          echo "VORPAL_USER_ARTIFACT=$VORPAL_USER_ARTIFACT" >> $GITHUB_ENV

      - run: |
          VORPAL_WEBSITE_ARTIFACT=$(vorpal build "vorpal-website")
          echo "VORPAL_WEBSITE_ARTIFACT=$VORPAL_WEBSITE_ARTIFACT" >> $GITHUB_ENV

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.go.toml" "vorpal")
          if [ "$ARTIFACT" != "$VORPAL_ARTIFACT" ]; then
            echo "Go SDK invalid match to Rust: $ARTIFACT != $VORPAL_ARTIFACT"
            exit 1
          fi

      - if: contains(matrix.runner, 'ubuntu')
        run: |
          ARTIFACT=$(vorpal build --config "Vorpal.go.toml" "vorpal-container-image")
          if [ "$ARTIFACT" != "$VORPAL_CONTAINER_IMAGE_ARTIFACT" ]; then
            echo "Go SDK invalid match to Rust: $ARTIFACT != $VORPAL_CONTAINER_IMAGE_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.go.toml" "vorpal-job")
          if [ "$ARTIFACT" != "$VORPAL_JOB_ARTIFACT" ]; then
            echo "Go SDK invalid match to Rust: $ARTIFACT != $VORPAL_JOB_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.go.toml" "vorpal-process")
          if [ "$ARTIFACT" != "$VORPAL_PROCESS_ARTIFACT" ]; then
            echo "Go SDK invalid match to Rust: $ARTIFACT != $VORPAL_PROCESS_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.go.toml" "vorpal-shell")
          if [ "$ARTIFACT" != "$VORPAL_SHELL_ARTIFACT" ]; then
            echo "Go SDK invalid match to Rust: $ARTIFACT != $VORPAL_SHELL_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.go.toml" "vorpal-user")
          if [ "$ARTIFACT" != "$VORPAL_USER_ARTIFACT" ]; then
            echo "Go SDK invalid match to Rust: $ARTIFACT != $VORPAL_USER_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.go.toml" "vorpal-website")
          if [ "$ARTIFACT" != "$VORPAL_WEBSITE_ARTIFACT" ]; then
            echo "Go SDK invalid match to Rust: $ARTIFACT != $VORPAL_WEBSITE_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.ts.toml" "vorpal")
          if [ "$ARTIFACT" != "$VORPAL_ARTIFACT" ]; then
            echo "TypeScript SDK invalid match to Rust: $ARTIFACT != $VORPAL_ARTIFACT"
            exit 1
          fi

      - if: contains(matrix.runner, 'ubuntu')
        run: |
          ARTIFACT=$(vorpal build --config "Vorpal.ts.toml" "vorpal-container-image")
          if [ "$ARTIFACT" != "$VORPAL_CONTAINER_IMAGE_ARTIFACT" ]; then
            echo "TypeScript SDK invalid match to Rust: $ARTIFACT != $VORPAL_CONTAINER_IMAGE_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.ts.toml" "vorpal-job")
          if [ "$ARTIFACT" != "$VORPAL_JOB_ARTIFACT" ]; then
            echo "TypeScript SDK invalid match to Rust: $ARTIFACT != $VORPAL_JOB_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.ts.toml" "vorpal-process")
          if [ "$ARTIFACT" != "$VORPAL_PROCESS_ARTIFACT" ]; then
            echo "TypeScript SDK invalid match to Rust: $ARTIFACT != $VORPAL_PROCESS_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.ts.toml" "vorpal-shell")
          if [ "$ARTIFACT" != "$VORPAL_SHELL_ARTIFACT" ]; then
            echo "TypeScript SDK invalid match to Rust: $ARTIFACT != $VORPAL_SHELL_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.ts.toml" "vorpal-user")
          if [ "$ARTIFACT" != "$VORPAL_USER_ARTIFACT" ]; then
            echo "TypeScript SDK invalid match to Rust: $ARTIFACT != $VORPAL_USER_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.ts.toml" "vorpal-website")
          if [ "$ARTIFACT" != "$VORPAL_WEBSITE_ARTIFACT" ]; then
            echo "TypeScript SDK invalid match to Rust: $ARTIFACT != $VORPAL_WEBSITE_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.py.toml" "vorpal")
          if [ "$ARTIFACT" != "$VORPAL_ARTIFACT" ]; then
            echo "Python SDK invalid match to Rust: $ARTIFACT != $VORPAL_ARTIFACT"
            exit 1
          fi

      - if: contains(matrix.runner, 'ubuntu')
        run: |
          ARTIFACT=$(vorpal build --config "Vorpal.py.toml" "vorpal-container-image")
          if [ "$ARTIFACT" != "$VORPAL_CONTAINER_IMAGE_ARTIFACT" ]; then
            echo "Python SDK invalid match to Rust: $ARTIFACT != $VORPAL_CONTAINER_IMAGE_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.py.toml" "vorpal-job")
          if [ "$ARTIFACT" != "$VORPAL_JOB_ARTIFACT" ]; then
            echo "Python SDK invalid match to Rust: $ARTIFACT != $VORPAL_JOB_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.py.toml" "vorpal-process")
          if [ "$ARTIFACT" != "$VORPAL_PROCESS_ARTIFACT" ]; then
            echo "Python SDK invalid match to Rust: $ARTIFACT != $VORPAL_PROCESS_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.py.toml" "vorpal-shell")
          if [ "$ARTIFACT" != "$VORPAL_SHELL_ARTIFACT" ]; then
            echo "Python SDK invalid match to Rust: $ARTIFACT != $VORPAL_SHELL_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.py.toml" "vorpal-user")
          if [ "$ARTIFACT" != "$VORPAL_USER_ARTIFACT" ]; then
            echo "Python SDK invalid match to Rust: $ARTIFACT != $VORPAL_USER_ARTIFACT"
            exit 1
          fi

      - run: |
          ARTIFACT=$(vorpal build --config "Vorpal.py.toml" "vorpal-website")
          if [ "$ARTIFACT" != "$VORPAL_WEBSITE_ARTIFACT" ]; then
            echo "Python SDK invalid match to Rust: $ARTIFACT != $VORPAL_WEBSITE_ARTIFACT"
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: vorpal-lock-${{ env.ARCH }}-${{ env.OS }}
          path: Vorpal.lock

  notify-lockfile-drift:
    needs:
      - test
    if: ${{ always() && github.event_name == 'pull_request' }}
    permissions:
      actions: read
      issues: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR lockfile drift
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if ! artifact_rows=$(gh api \
            "repos/${REPOSITORY}/actions/runs/${RUN_ID}/artifacts?per_page=100" \
            --paginate \
            --jq '.artifacts[] | select(.name | startswith("vorpal-prepare-lock-")) | [.name, (.id | tostring)] | @tsv'); then
            echo "::warning::Unable to list lockfile drift artifacts."
            exit 0
          fi

          if [ -z "$artifact_rows" ]; then
            echo "No lockfile drift artifacts found."
            exit 0
          fi

          body_file=$(mktemp)
          while IFS=$'\t' read -r artifact_name artifact_id; do
            [ -n "$artifact_name" ] || continue
            artifact_url="https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}/artifacts/${artifact_id}"
            runner_name="${artifact_name#vorpal-prepare-lock-}"
            {
              echo "Vorpal.lock changed during \`vorpal prepare\` on ${runner_name}."
              echo
              echo "Download the updated lockfile artifact: ${artifact_url}"
              echo
              echo "Replace \`Vorpal.lock\` with that artifact, commit it, and re-push."
            } > "$body_file"

            gh pr comment "$PR_NUMBER" --repo "$REPOSITORY" --body-file "$body_file" \
              || echo "::warning::Unable to comment on the pull request; lockfile drift artifact ${artifact_name} was uploaded."
          done <<EOF
          $artifact_rows
          EOF

  release:
    if: ${{ github.event_name == 'push' && contains(github.ref, 'refs/tags/') }}
    needs:
      - test
    permissions:
      attestations: write
      contents: write
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          fail-on-cache-miss: true
          pattern: vorpal-dist-*

      - uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          files: |
            vorpal-dist-aarch64-darwin/vorpal-aarch64-darwin.tar.gz
            vorpal-dist-aarch64-linux/vorpal-aarch64-linux.tar.gz
            vorpal-dist-x86_64-darwin/vorpal-x86_64-darwin.tar.gz
            vorpal-dist-x86_64-linux/vorpal-x86_64-linux.tar.gz
          name: ${{ github.ref_name }}
          prerelease: true
          tag_name: ${{ github.ref }}

      - run: |
          mkdir -p dist/aarch64-darwin
          mkdir -p dist/aarch64-linux
          mkdir -p dist/x86_64-darwin
          mkdir -p dist/x86_64-linux
          tar -xzf vorpal-dist-aarch64-darwin/vorpal-aarch64-darwin.tar.gz -C dist/aarch64-darwin
          tar -xzf vorpal-dist-aarch64-linux/vorpal-aarch64-linux.tar.gz -C dist/aarch64-linux
          tar -xzf vorpal-dist-x86_64-darwin/vorpal-x86_64-darwin.tar.gz -C dist/x86_64-darwin
          tar -xzf vorpal-dist-x86_64-linux/vorpal-x86_64-linux.tar.gz -C dist/x86_64-linux
          mv dist/aarch64-darwin/vorpal dist/aarch64-darwin/vorpal-aarch64-darwin
          mv dist/aarch64-linux/vorpal dist/aarch64-linux/vorpal-aarch64-linux
          mv dist/x86_64-darwin/vorpal dist/x86_64-darwin/vorpal-x86_64-darwin
          mv dist/x86_64-linux/vorpal dist/x86_64-linux/vorpal-x86_64-linux

      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/aarch64-darwin/vorpal-aarch64-darwin
            dist/aarch64-linux/vorpal-aarch64-linux
            dist/x86_64-darwin/vorpal-x86_64-darwin
            dist/x86_64-linux/vorpal-x86_64-linux

  release-container-image:
    if: ${{ github.event_name == 'push' && contains(github.ref, 'refs/tags/') }}
    needs:
      - test
    permissions:
      contents: write
      id-token: write
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-latest-arm64
    steps:
      - uses: actions/checkout@v6

      - run: ./script/dev/debian.sh

      - run: |
          echo "ARCH=$(uname -m | tr '[:upper:]' '[:lower:]' | sed 's/arm64/aarch64/')" >> $GITHUB_ENV
          echo "OS=$(uname -s | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - run: |
          if [ "$ARCH" = "aarch64" ]; then
            echo "PLATFORM=linux/arm64" >> $GITHUB_ENV
          else
            echo "PLATFORM=linux/amd64" >> $GITHUB_ENV
          fi

      - uses: actions/download-artifact@v8
        with:
          name: vorpal-dist-${{ env.ARCH }}-${{ env.OS }}

      - run: |
          mkdir -p ./dist
          tar -xzf ./vorpal-${ARCH}-${OS}.tar.gz -C ./dist
          rm -rf ./vorpal-${ARCH}-${OS}.tar.gz

      - uses: ALT-F4-LLC/setup-vorpal-action@main
        with:
          registry-backend: s3
          registry-backend-s3-bucket: altf4llc-vorpal-registry
          use-local-build: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - run: |
          ARTIFACT_PATH=$(vorpal build --path "vorpal-container-image")
          echo "ARTIFACT_PATH=$ARTIFACT_PATH" >> $GITHUB_ENV

      - run: docker image load < ${ARTIFACT_PATH}/image.tar

      - uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}

      - run: |
          if [ "$ARCH" = "aarch64" ]; then
            TAG_SUFFIX="arm64"
          else
            TAG_SUFFIX="amd64"
          fi
          docker image tag \
            "vorpal-container-image:latest" \
            "docker.io/altf4llc/vorpal:${{ github.ref_name }}-${TAG_SUFFIX}"

      - run: |
          if [ "$ARCH" = "aarch64" ]; then
            TAG_SUFFIX="arm64"
          else
            TAG_SUFFIX="amd64"
          fi
          docker image push "docker.io/altf4llc/vorpal:${{ github.ref_name }}-${TAG_SUFFIX}"

  release-container-image-manifest:
    if: ${{ github.event_name == 'push' && contains(github.ref, 'refs/tags/') }}
    needs:
      - release-container-image
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}

      - run: |
          docker manifest create docker.io/altf4llc/vorpal:${{ github.ref_name }} \
            docker.io/altf4llc/vorpal:${{ github.ref_name }}-amd64 \
            docker.io/altf4llc/vorpal:${{ github.ref_name }}-arm64

      - run: docker manifest push docker.io/altf4llc/vorpal:${{ github.ref_name }}

  # release-sdk-rust:
  #   if: ${{ github.event_name == 'push' && contains(github.ref, 'refs/tags/') && !contains(github.ref, 'nightly') }}
  #   needs:
  #     - test
  #   permissions:
  #     contents: read
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #
  #     - uses: actions/cache/restore@v5
