name: website

on:
  pull_request:
    paths:
      - "website/**"
  push:
    branches:
      - "main"
    paths:
      - "website/**"

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

env:
  CI: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install
        working-directory: website

      - run: bun run build
        working-directory: website

      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --base website/dist
            --no-progress
            --timeout 30
            --max-retries 3
            --retry-wait-time 5
            --exclude-path website/dist/pagefind
            website/dist

      - uses: actions/upload-artifact@v7
        with:
          name: website-dist
          path: website/dist

  deploy:
    needs:
      - build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: website-dist
          path: website/dist

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/dist/ --project-name=vorpal-docs

  preview:
    needs:
      - build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: website-dist
          path: website/dist

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/dist/ --project-name=vorpal-docs --branch=${{ github.head_ref }}
